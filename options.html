<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Open Brain — Today — Настройки</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 28px;
    width: 480px;
    max-width: 90vw;
  }
  h1 {
    font-size: 18px;
    color: #fff;
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 13px;
    color: #888;
    margin-bottom: 14px;
  }
  input {
    display: block;
    width: 100%;
    margin-top: 6px;
    padding: 10px 12px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 14px;
    font-family: inherit;
  }
  input:focus { outline: none; border-color: #555; }
  .actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    justify-content: flex-end;
  }
  button {
    background: #fff;
    color: #000;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  button.secondary { background: #2a2a2a; color: #ccc; }
  .status {
    margin-top: 12px;
    font-size: 13px;
    color: #4a8a4a;
    min-height: 20px;
  }
  .status.error { color: #c66; }
</style>
</head>
<body>
  <div class="card">
    <h1>Open Brain — Today</h1>
    <label>
      Format Focus URL
      <input type="text" id="endpoint" placeholder="https://xxx.supabase.co/functions/v1/format-focus">
    </label>
    <label>
      MCP Endpoint
      <input type="text" id="mcp" placeholder="https://xxx.supabase.co/functions/v1/open-brain-mcp">
    </label>
    <label>
      API Key
      <input type="password" id="key" placeholder="your-mcp-key">
    </label>
    <div class="actions">
      <button id="test" class="secondary">Тест</button>
      <button id="save">Сохранить</button>
    </div>
    <p class="status" id="status"></p>
  </div>
  <script src="options.js"></script>
</body>
</html>
